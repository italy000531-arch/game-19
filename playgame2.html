<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dungeon of Whispers Mobile</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a2e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
            border: 4px solid #ff69b4;
            border-radius: 10px;
            background: #0f0f1a;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background: #0f0f1a;
            max-width: 100%;
            max-height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 10px;
            pointer-events: none;
            z-index: 5;
            width: 100%;
            box-sizing: border-box;
            padding: 0 10px;
        }

        .hud-text {
            font-size: 16px;
            font-weight: bold;
            color: #ff69b4;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 5px;
            display: inline-block;
            margin-right: 15px;
            background: rgba(0,0,0,0.5);
            padding: 2px 5px;
            border-radius: 4px;
        }

        #level-indicator {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #ff69b4;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: 5;
            text-align: center;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #ff69b4;
            text-shadow: 0 0 10px #ff69b4;
            margin-bottom: 15px;
            font-size: 24px;
            text-align: center;
        }

        p {
            color: #ccc;
            margin-bottom: 15px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            font-size: 16px;
        }

        input[type="text"] {
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ff69b4;
            border-radius: 5px;
            background: #222;
            color: #fff;
            font-size: 18px;
            outline: none;
            text-align: center;
            width: 80%;
            max-width: 300px;
        }

        #leaderboard-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            width: 90%;
            max-width: 400px;
            display: none; 
            max-height: 40vh;
            overflow-y: auto;
        }

        .leaderboard-title {
            font-size: 18px;
            color: #ffd700;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 5px;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .leaderboard-row.current-player {
            color: #ff69b4;
            font-weight: bold;
            background: rgba(255, 105, 180, 0.2);
            padding: 5px;
            border-radius: 4px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 20px;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            min-width: 120px;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        #btn-start {
            background: #ff69b4;
        }

        #btn-sound {
            background: #444;
            border: 1px solid #666;
            font-size: 14px;
            padding: 15px 10px;
        }

        #btn-sound.active {
            background: #2ecc71;
            color: #fff;
            border-color: #2ecc71;
        }

    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui-layer">
        <div class="hud-text">LVL <span id="level">1</span></div>
        <div class="hud-text">SCORE <span id="score">0</span></div>
        <div class="hud-text">TIME <span id="timer">30</span></div>
    </div>

    <div id="level-indicator"></div>

    <div id="overlay">
        <h1>DUNGEON OF WHISPERS</h1>
        <p>點擊屏幕上的怪物。<br>每過一關，艾莉絲會脫下一件衣物。<br>擊殺足夠怪物以通關。</p>
        
        <input type="text" id="playerNameInput" placeholder="輸入名字" maxlength="10" autocomplete="off">
        
        <div id="leaderboard-box">
            <div class="leaderboard-title">🏆 排行榜 🏆</div>
            <div id="leaderboard-content"></div>
        </div>

        <div class="btn-group">
            <button id="btn-sound" onclick="toggleSound()">🔇 音效: 關</button>
            <button id="btn-start" onclick="startGame()">開始遊戲</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const levelEl = document.getElementById('level');
const scoreEl = document.getElementById('score');
const timerEl = document.getElementById('timer');
const overlay = document.getElementById('overlay');
const levelIndicator = document.getElementById('level-indicator');
const nameInput = document.getElementById('playerNameInput');
const leaderboardBox = document.getElementById('leaderboard-box');
const leaderboardContent = document.getElementById('leaderboard-content');
const soundBtn = document.getElementById('btn-sound');

// Game State
let gameRunning = false;
let currentLevel = 1;
let score = 0;
let targetScore = 15;
let timeLeft = 30;
let lastTime = Date.now();
let enemies = [];
let particles = [];
let currentName = "";

// Audio System
let audioCtx = null;
let soundEnabled = false;
let bgmOscillators = [];
let bgmGain = null;

// --- AUDIO FUNCTIONS ---

function initAudio() {
    if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        bgmGain = audioCtx.createGain();
        bgmGain.gain.value = 0.1; // Background volume low
        bgmGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playHitSound() {
    if (!soundEnabled || !audioCtx) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'square';
    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
    
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
}

function startBGM() {
    if (!soundEnabled || !audioCtx) return;
    stopBGM();

    const freqs = [110, 164.81, 220]; 
    freqs.forEach(freq => {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        osc.connect(bgmGain);
        osc.start();
        bgmOscillators.push(osc);
    });
}

function stopBGM() {
    bgmOscillators.forEach(osc => {
        try { osc.stop(); } catch(e){}
    });
    bgmOscillators = [];
}

function toggleSound() {
    soundEnabled = !soundEnabled;
    if (soundEnabled) {
        initAudio();
        soundBtn.classList.add('active');
        soundBtn.innerHTML = "🔊 音效: 開";
        if (gameRunning) startBGM();
    } else {
        soundBtn.classList.remove('active');
        soundBtn.innerHTML = "🔇 音效: 關";
        stopBGM();
    }
}

// --- GAME LOGIC ---

let alice = {
    x: 100, y: 300, width: 100, height: 200
};

function saveScore(name, score) {
    if (!name) name = "Unknown";
    let scores = JSON.parse(localStorage.getItem('dungeon_scores')) || [];
    scores.push({ name: name, score: score, date: new Date().toISOString() });
    scores.sort((a, b) => b.score - a.score);
    scores = scores.slice(0, 50);
    localStorage.setItem('dungeon_scores', JSON.stringify(scores));
}

function displayLeaderboard(highScore) {
    let scores = JSON.parse(localStorage.getItem('dungeon_scores')) || [];
    leaderboardContent.innerHTML = "";
    const topScores = scores.slice(0, 10);
    topScores.forEach((entry, index) => {
        const row = document.createElement('div');
        row.className = "leaderboard-row";
        if (entry.name === currentName && entry.score === highScore) {
            row.classList.add("current-player");
        }
        row.innerHTML = `
            <span>#${index + 1} ${entry.name}</span>
            <span>${entry.score} PTS</span>
        `;
        leaderboardContent.appendChild(row);
    });
    leaderboardBox.style.display = "block";
}

nameInput.addEventListener("keyup", function(event) {
    if (event.key === "Enter") startGame();
});

function drawAlice(level) {
    const x = alice.x;
    const y = alice.y;
    const skinColor = '#ffe0bd';
    const dressColor = '#2c3e50';
    const laceColor = '#ff69b4';

    ctx.save();
    ctx.translate(x, y);
    
    ctx.fillStyle = '#8B4513';
    ctx.beginPath(); ctx.ellipse(50, -10, 30, 40, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = skinColor;
    ctx.beginPath(); ctx.ellipse(50, 0, 20, 25, 0, 0, Math.PI * 2); ctx.fill();
    
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(42, -5, 2, 0, Math.PI*2); ctx.arc(58, -5, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255, 105, 180, 0.4)';
    ctx.beginPath(); ctx.arc(35, 5, 5, 0, Math.PI*2); ctx.arc(65, 5, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = skinColor;
    ctx.fillRect(45, 20, 10, 10);

    ctx.beginPath(); ctx.moveTo(30, 30); ctx.lineTo(70, 30); ctx.lineTo(65, 140); ctx.lineTo(35, 140); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = skinColor; ctx.lineWidth = 8; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(30, 30); ctx.lineTo(10, 80); ctx.moveTo(70, 30); ctx.lineTo(90, 80); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(35, 140); ctx.lineTo(25, 210); ctx.moveTo(65, 140); ctx.lineTo(75, 210); ctx.stroke();

    if (level === 1) {
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(50, -10, 35, 15, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = dressColor; ctx.beginPath(); ctx.moveTo(20, 20); ctx.lineTo(80, 20); ctx.lineTo(90, 210); ctx.lineTo(10, 210); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(40, 20); ctx.lineTo(50, 40); ctx.lineTo(60, 20); ctx.fill();
    } else if (level === 2) {
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(40, 55, 10, 0, Math.PI*2); ctx.arc(60, 55, 10, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = laceColor; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(40, 55, 10, 0, Math.PI*2); ctx.arc(60, 55, 10, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(25, 110); ctx.quadraticCurveTo(50, 180, 75, 110); ctx.lineTo(70, 140); ctx.lineTo(30, 140); ctx.fill();
        ctx.strokeStyle = laceColor; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(25, 110); ctx.quadraticCurveTo(50, 180, 75, 110); ctx.stroke();
    } else if (level === 3) {
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(40, 55, 10, 0, Math.PI*2); ctx.arc(60, 55, 10, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = laceColor; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(40, 55, 10, 0, Math.PI*2); ctx.arc(60, 55, 10, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.moveTo(35, 110); ctx.quadraticCurveTo(50, 130, 65, 110); ctx.lineTo(60, 140); ctx.lineTo(40, 140); ctx.fill();
        ctx.strokeStyle = laceColor; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(35, 110); ctx.quadraticCurveTo(50, 130, 65, 110); ctx.stroke();
    } else if (level === 4) {
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.moveTo(35, 110); ctx.quadraticCurveTo(50, 130, 65, 110); ctx.lineTo(60, 140); ctx.lineTo(40, 140); ctx.fill();
        ctx.strokeStyle = laceColor; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(35, 110); ctx.quadraticCurveTo(50, 130, 65, 110); ctx.stroke();
    }
    ctx.restore();
}

function drawEnemy(enemy) {
    ctx.save();
    ctx.translate(enemy.x + enemy.width/2, enemy.y + enemy.height/2);
    ctx.fillStyle = '#ff4444';
    ctx.beginPath(); ctx.arc(0, 0, enemy.radius, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-5, -5, 3, 0, Math.PI*2); ctx.arc(5, -5, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-5, -5, 1, 0, Math.PI*2); ctx.arc(5, -5, 1, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawParticles() {
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life--;
        ctx.fillStyle = `rgba(255, 105, 180, ${p.life/20})`;
        ctx.fillRect(p.x, p.y, p.size, p.size);
        if (p.life <= 0) particles.splice(i, 1);
    });
}

function createParticles(x, y, color) {
    for(let i=0; i<20; i++) { // 增加粒子數量以加強反饋
        particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20, life: 30, size: Math.random() * 8 + 2, color: color });
    }
}

function spawnEnemy() {
    // 確保怪物生成在邊界內，不會被遮擋
    const size = 40;
    const margin = 50;
    const x = Math.random() * (canvas.width - size - margin * 2) + margin;
    const y = Math.random() * (canvas.height - size - margin * 2) + margin;
    const speed = 1 + currentLevel * 0.5;
    const vx = (Math.random() - 0.5) * speed;
    const vy = (Math.random() - 0.5) * speed;
    enemies.push({ x: x, y: y, width: size, height: size, radius: size/2, vx: vx, vy: vy, active: true });
}

function updateGame() {
    if (!gameRunning) return;
    if (Date.now() - lastTime > 1000) {
        timeLeft--;
        timerEl.innerText = timeLeft;
        lastTime = Date.now();
        if (timeLeft <= 0) gameOver();
    }
    if (enemies.length < 3 + currentLevel && Math.random() < 0.05) spawnEnemy();
    enemies.forEach((enemy) => {
        enemy.x += enemy.vx; enemy.y += enemy.vy;
        if (enemy.x <= margin || enemy.x + enemy.width >= canvas.width - margin) enemy.vx *= -1;
        if (enemy.y <= margin || enemy.y + enemy.height >= canvas.height - margin) enemy.vy *= -1;
    });
    if (score >= targetScore) nextLevel();
}

function draw() {
    ctx.fillStyle = '#0f0f1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, '#2c3e50'); gradient.addColorStop(1, '#000000');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawAlice(alice.level);
    enemies.forEach(enemy => drawEnemy(enemy));
    drawParticles();
    updateGame();
    requestAnimationFrame(draw);
}

canvas.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY));
canvas.addEventListener('touchstart', (e) => {
    if(e.touches.length > 0) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        const touchY = e.touches[0].clientY - rect.top;
        handleInput(touchX, touchY);
    }
}, {passive: false});

function handleInput(inputX, inputY) {
    if (!gameRunning) return;
    
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    const mouseX = (inputX - rect.left) * scaleX;
    const mouseY = (inputY - rect.top) * scaleY;

    for (let i = enemies.length - 1; i >= 0; i--) {
        let enemy = enemies[i];
        const ex = enemy.x + enemy.width / 2;
        const ey = enemy.y + enemy.height / 2;
        
        // --- 關鍵修改：擴大判定半徑 ---
        const hitRadius = enemy.radius * 2.5; 

        const dx = mouseX - ex;
        const dy = mouseY - ey;
        const distance = Math.sqrt(dx*dx + dy*dy);
        
        if (distance < hitRadius) {
            hitEnemy(enemy, i);
            break; 
        }
    }
}

function hitEnemy(enemy, index) {
    playHitSound(); 
    createParticles(enemy.x + enemy.width/2, enemy.y + enemy.height/2, '#ff69b4');
    enemies.splice(index, 1);
    score++;
    scoreEl.innerText = score;
}

function nextLevel() {
    if (currentLevel >= 5) { gameWin(); return; }
    gameRunning = false; enemies = [];
    levelEl.innerText = currentLevel + 1;
    levelIndicator.style.opacity = 1;
    levelIndicator.innerText = "LEVEL " + (currentLevel + 1);
    alice.level++;
    setTimeout(() => {
        levelIndicator.style.opacity = 0;
        currentLevel++; score = 0;
        targetScore = 15 + currentLevel * 5;
        timeLeft = 30;
        levelEl.innerText = currentLevel;
        scoreEl.innerText = score;
        timerEl.innerText = timeLeft;
        gameRunning = true;
    }, 2000);
}

function startGame() {
    initAudio(); 
    currentName = nameInput.value.trim();
    if (!currentName) { alert("請輸入名字！"); nameInput.focus(); return; }
    gameRunning = true; currentLevel = 1; score = 0; targetScore = 15; timeLeft = 30; alice.level = 1;
    enemies = []; particles = [];
    levelEl.innerText = currentLevel; scoreEl.innerText = score; timerEl.innerText = timeLeft;
    leaderboardBox.style.display = "none";
    overlay.style.display = 'none';
    lastTime = Date.now();
    if (soundEnabled) startBGM();
    draw();
}

function gameOver() {
    gameRunning = false; 
    stopBGM();
    saveScore(currentName, score); 
    displayLeaderboard(score);
    overlay.style.display = 'flex';
    overlay.querySelector('h1').innerText = "GAME OVER";
    overlay.querySelector('p').innerHTML = `等級: ${currentLevel}<br>得分: ${score}`;
    overlay.querySelector('#btn-start').innerText = "再試一次";
}

function gameWin() {
    gameRunning = false; 
    stopBGM();
    saveScore(currentName, score); 
    displayLeaderboard(score);
    overlay.style.display = 'flex';
    overlay.querySelector('h1').innerText = "CONGRATULATIONS!";
    overlay.querySelector('p').innerHTML = `看到了艾莉絲的真面目!<br>得分: ${score}`;
    overlay.querySelector('#btn-start').innerText = "再玩一次";
}

const margin = 50;
drawAlice(1);

</script>
</body>
</html>
